<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Fund Me App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #fff;
      }

      .card {
        background: #111827;
        padding: 30px;
        border-radius: 16px;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 20px;
        margin-bottom: 20px;
        text-align: center;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      button {
        padding: 10px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        opacity: 0.9;
      }

      .primary {
        background: #3b82f6;
        color: white;
      }

      .secondary {
        background: #374151;
        color: white;
      }

      .danger {
        background: #ef4444;
        color: white;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #1f2937;
        color: white;
      }

      label {
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>💰 Fund Me</h1>

      <div class="buttons">
        <button id="connectButton" class="primary">Connect Wallet</button>
        <button id="balanceButton" class="secondary">Get Balance</button>
        <button id="withdrawButton" class="danger">Withdraw</button>
      </div>

      <div class="input-group">
        <label for="ethAmount">ETH Amount</label>
        <input id="ethAmount" placeholder="0.1" />
        <button type="button" id="fundButton" class="primary">
          Fund
        </button>
      </div>
    </div>

    <script src="./index.js" type="module"></script>
  </body>
</html>
